@if (isMapApiLoaded()) {
<google-map [center]="center" [zoom]="zoom" mapId="airport-map">
  @for (airport of this.airportService.airports(); track $index) {
  <map-advanced-marker
    [position]="{
            lat: airport.lat,
            lng: airport.lng,
          }"
    [title]="airport.name"
    [content]="getMarkerPin(airport).element"
    (mapClick)="showFlights(airport)"
  ></map-advanced-marker>
  }
</google-map>
}
